{% extends 'notes/base.html' %}

{% block content %}
<div class="card p-4">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <h2>{{ note.title }}</h2>
        {% if note.is_important %}
            <span class="badge bg-danger fs-6">Важная заметка</span>
        {% endif %}
    </div>
    
    <p class="text-muted small">Дата создания: {{ note.created_at|date:"d.m.Y H:i" }}</p>
    <hr>
    <p class="fs-5" style="white-space: pre-line;">{{ note.text }}</p>
    <hr>
    
    <div class="mt-3">
        <a href="{% url 'note_list' %}" class="btn btn-secondary">Назад к списку</a>
        <a href="{% url 'note_update' note.pk %}" class="btn btn-warning">Редактировать</a>
        <a href="{% url 'note_delete' note.pk %}" class="btn btn-danger">Удалить</a>
    </div>
</div>
{% endblock %}
