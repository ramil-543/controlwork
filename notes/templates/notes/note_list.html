{% extends 'notes/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Все заметки</h2>
    <a href="{% url 'note_create' %}" class="btn btn-primary">Новая заметка</a>
</div>

<div class="row">
    {% for note in notes %}
        <div class="col-md-4 mb-3">
            <div class="card h-100 {% if note.is_important %}border-danger bg-light{% endif %}">
                <div class="card-body">
                    <h5 class="card-title">
                        <a href="{% url 'note_detail' note.pk %}" class="text-decoration-none text-dark fw-bold">
                            {{ note.title }}
                        </a>
                        {% if note.is_important %}
                            <span class="badge bg-danger float-end">Важно!</span>
                        {% endif %}
                    </h5>
                    <p class="card-text text-muted small">Создано: {{ note.created_at|date:"d.m.Y H:i" }}</p>
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-muted">Заметок пока нет. Создайте первую!</p>
    {% endfor %}
</div>
{% endblock %}
