{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow border-0">

                <!-- Заголовок -->
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="text-center mb-0 fw-bold">Вход в аккаунт</h4>
                </div>

                <div class="card-body p-4">

                    <!-- Общая ошибка (например, неверный логин или пароль) -->
                    {% if form.errors %}
                        <div class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                            {{ form.errors }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Имя пользователя</label>
                            <input type="text" 
                                   name="username" 
                                   id="username"
                                   class="form-control"
                                   placeholder="Введите имя пользователя"
                                   autocomplete="username"
                                   required>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Пароль</label>
                            <input type="password" 
                                   name="password" 
                                   id="password"
                                   class="form-control"
                                   placeholder="Введите пароль"
                                   autocomplete="current-password"
                                   required>
                        </div>

                        <!-- Кнопка -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold py-2">
                                Войти
                            </button>
                        </div>
                    </form>

                </div>

                <!-- Нижняя часть -->
                <div class="card-footer bg-light text-center py-3">
                    <small>
                        Нет аккаунта? 
                        <a href="{% url 'register' %}" class="text-decoration-none">Зарегистрироваться</a>
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
