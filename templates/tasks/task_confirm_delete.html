<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удалить задачу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center" style="max-width: 500px;">
    <div class="card border-danger shadow-sm p-4">
        <h4 class="text-danger mb-3">Удалить задачу?</h4>
        <p>Вы уверены, что хотите навсегда удалить задачу: <strong>"{{ task.title }}"</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-danger w-100">Да, удалить</button>
                <a href="{% url 'task_list' %}" class="btn btn-secondary w-100">Отмена</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
