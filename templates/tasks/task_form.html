<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ action }} задачу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4">
        <h4 class="mb-3 text-center">{{ action }} задачу</h4>
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Название:</label>
                {{ form.title }}
                {% if form.title.errors %}<div class="text-danger small">{{ form.title.errors }}</div>{% endif %}
            </div>
            
            <div class="mb-3">
                <label class="form-label">Описание:</label>
                {{ form.description }}
            </div>

            <div class="mb-3 form-check">
                {{ form.completed }}
                <label class="form-check-label">Отметить как выполненную</label>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success w-100">Сохранить</button>
                <a href="{% url 'task_list' %}" class="btn btn-secondary w-100">Отмена</a>
            </div>
        </form>
    </div>
</div>

<script>
    if(document.querySelector('#id_title')) { document.querySelector('#id_title').classList.add('form-control'); }
    if(document.querySelector('#id_description')) { document.querySelector('#id_description').classList.add('form-control'); }
    if(document.querySelector('#id_completed')) { document.querySelector('#id_completed').classList.add('form-check-input'); }
</script>
</body>
</html>
